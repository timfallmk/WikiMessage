name: CI

on:
  push:
    branches: [master, "claude/**"]
  pull_request:
    branches: [master]

jobs:
  build-test:
    name: Build & Test
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "15.4"

      - name: List available simulators
        run: xcrun simctl list devices available

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: derived-data-${{ hashFiles('WikiMessage.xcodeproj/project.pbxproj') }}
          restore-keys: derived-data-

      - name: Build
        run: |
          xcodebuild \
            -project WikiMessage.xcodeproj \
            -scheme "WikiMessage MessagesExtension" \
            -destination "platform=iOS Simulator,name=iPhone 15,OS=latest" \
            -derivedDataPath ~/Library/Developer/Xcode/DerivedData \
            clean build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Test
        run: |
          xcodebuild \
            -project WikiMessage.xcodeproj \
            -scheme "WikiMessage MessagesExtension" \
            -destination "platform=iOS Simulator,name=iPhone 15,OS=latest" \
            -derivedDataPath ~/Library/Developer/Xcode/DerivedData \
            test-without-building \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

  lint:
    name: swift-format
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "15.4"

      - name: Lint
        run: swift format lint --recursive .
