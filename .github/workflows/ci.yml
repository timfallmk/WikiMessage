name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build & Test
    runs-on: macos-13

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 14
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "14"

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: derived-data-${{ hashFiles('WikiMessage.xcodeproj/project.pbxproj') }}
          restore-keys: derived-data-

      - name: Build & Test
        run: |
          xcodebuild \
            -project WikiMessage.xcodeproj \
            -scheme "WikiMessage MessagesExtension" \
            -destination "platform=iOS Simulator,name=iPhone 14,OS=latest" \
            -derivedDataPath ~/Library/Developer/Xcode/DerivedData \
            clean build test \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

  lint:
    name: swift-format
    runs-on: macos-13

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 14
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "14"

      - name: Lint
        run: swift format lint --recursive --strict .
